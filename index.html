<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart-Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /></link>
    <link rel="stylesheet" href="style.css"></link>
</head>
<body>
    <header>
        <div class="top1">
            <div class="topLogo">
                <div class="flipkartName">
                    <div class="flipkartImg">
                        <img src="Images/FlipkartLogo.png" ; height="22px";width="25px"/>
                        <img src="Images/Flipkart.png"; height="18px";width="46px"/>
                    </div>
                </div>
                <div class="travelLogo">
                    <div class="travelImg">
                        <img src="Images/TravelLogo.png" ; height="22px";width="25px" />
                        <img src="Images/Travel.png" ; height="18px";width="46px" />
                    </div>
                </div>
            </div>
            <div class="location">
                <div class="locationText">
                    <i class="fa-solid fa-location-dot"></i>
                    <p id="locationText1">Location not set</p>
                    <p id="locationText2" style="color: #1254E7;">Select Delivery location ></p>
                </div>
            </div>
        </div>
        <div class="navbar"></div>
    </header>
</body>
</html>
